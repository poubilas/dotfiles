;==========================================================

[colors]
background     = #282828
background-alt = #3c3836
foreground     = #ebdbb2
foreground-dim = #928374
yellow         = #d79921
green          = #98971a
blue           = #458588
red            = #cc241d
aqua           = #689d6a

[bar/example]
monitor = ${env:MONITOR:}
width = 100%
height = 44
radius = 0
fixed-center = true
top = yes
bottom = no
override-redirect = false

foreground = ${colors.foreground}
background = ${colors.background}

line-size = 2
line-color = ${colors.yellow}

border-bottom-size = 2
border-bottom-color = ${colors.background-alt}
border-top-size = 0
border-left-size = 0
border-right-size = 0

padding-left = 1
padding-right = 2

module-margin-left = 1
module-margin-right = 1

font-0 = "Hack:pixelsize=16;3"
font-1 = "FiraCode Nerd Font Mono:pixelsize=16;3"
font-2 = "FontAwesome5Free:style=Solid:pixelsize=14;3"
font-3 = "FontAwesome5Brands:style=Regular:pixelsize=14;3"
font-4 = "Weather Icons:style=Regular:size=10;2"

modules-left   = i3
modules-center = date
modules-right  = cpu memory battery volume

tray-position  = right
tray-padding   = 4
tray-maxsize   = 16
tray-background = ${colors.background}

wm-restack = i3
scroll-up = #i3.next
scroll-down = #i3.prev
cursor-click = pointer


[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false
strip-wsnumbers = false
enable-click = true
enable-scroll = false

label-mode            = %mode%
label-mode-padding    = 2
label-mode-foreground = ${colors.background}
label-mode-background = ${colors.yellow}

label-focused            = %index%
label-focused-foreground = ${colors.background}
label-focused-background = ${colors.yellow}
label-focused-padding    = 2

label-unfocused            = %index%
label-unfocused-padding    = 2
label-unfocused-foreground = ${colors.foreground-dim}
label-unfocused-background = ${colors.background}

label-visible            = %index%
label-visible-foreground = ${colors.foreground}
label-visible-background = ${colors.background-alt}
label-visible-padding    = 2

label-urgent            = %index%
label-urgent-foreground = ${colors.background}
label-urgent-background = ${colors.red}
label-urgent-padding    = 2

label-separator            =
label-separator-padding    = 0
label-separator-foreground = ${colors.foreground-dim}


[module/date]
type = internal/date
interval = 1.0
time = %H:%M
label = %{T2}%{T-}  %time%
label-foreground = ${colors.foreground}


[module/cpu]
type = internal/cpu
interval = 2
format = <label>
label = %{T2}%{T-} %percentage%%
label-foreground = ${colors.foreground}


[module/memory]
type = internal/memory
interval = 2
format = <label>
label = %{T2}%{T-} %used% / 16 GB
label-foreground = ${colors.foreground}


[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98
low-at = 10
poll-interval = 5

format-charging    = <label-charging>
format-discharging = <label-discharging>
format-full        = <label-full>
format-low         = <label-low>

label-charging    = %{T2}%{T-} %percentage%%
label-discharging = %{T2}%{T-} %percentage%%
label-full        = %{T2}%{T-} Full
label-low         = %{T2}%{T-} %percentage%%
label-low-foreground = ${colors.red}


[module/volume]
type = internal/alsa
master-soundcard    = default
speaker-soundcard   = default
headphone-soundcard = default
master-mixer = Master

format-volume = <label-volume>
label-volume            = %{T2}%{T-} %percentage%%
label-volume-foreground = ${colors.foreground}

format-muted-foreground = ${colors.foreground-dim}
label-muted = %{T2}%{T-} Muted


[settings]
throttle-output     = 5
throttle-output-for = 10
screenchange-reload = true
compositing-background = over
compositing-foreground = over
compositing-overline    = over
compositing-border      = over

[global/wm]
margin-top    = 5
margin-bottom = 5
